<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Test Chai Shop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #1a1410;
    color: #f5ead6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 480px;
    width: 100%;
    background: #241c15;
    border: 1px solid #4a3c2a;
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
  }
  h1 {
    font-size: 2.2rem;
    letter-spacing: 1px;
    color: #f0c987;
    margin-bottom: 8px;
  }
  .tagline {
    color: #cbb99a;
    font-size: 0.95rem;
    margin-bottom: 28px;
    font-style: italic;
  }
  .detail {
    margin-bottom: 18px;
  }
  .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #b08d57;
    margin-bottom: 4px;
  }
  .value {
    font-size: 1.05rem;
    color: #f5ead6;
  }
  .value a {
    color: #f0c987;
    text-decoration: none;
  }
  .divider {
    height: 1px;
    background: #4a3c2a;
    margin: 24px 0;
  }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
